# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: VISION BASE Lab
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: zh-TW
  baseUrl: visionbase-usc.github.io/vision-base-quartz
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      title: Manrope
      header: Manrope
      body: Noto Sans TC
      code: IBM Plex Mono
    colors:
      # VISION BASE brand identity — light mode is the inverted (Vision White) variant.
      lightMode:
        light: "#ffffff" # Vision White (page bg)
        lightgray: "#e5e5e5" # hairline dividers
        gray: "#b8b8b8" # graph links / muted lines
        darkgray: "#2b2b2b" # body text
        dark: "#0f0f0f" # Base Black (headings)
        secondary: "#d2520f" # VB Orange (darkened for contrast on white) — links/accent
        tertiary: "#2b86b4" # VB Blue (darkened) — hover
        highlight: rgba(249, 100, 25, 0.1) # orange-tinted internal-link / code bg
        textHighlight: "#e6e14366" # VB Yellow ==highlight==
      # Dark ("night") mode is the default — Base Black brand variant.
      darkMode:
        light: "#0f0f0f" # Base Black (page bg)
        lightgray: "#2a2a2a" # Divider — hairlines / card borders
        gray: "#8a8a8a" # Muted Text — captions, graph links
        darkgray: "#e8e8e8" # body text (near Vision White, comfortable)
        dark: "#ffffff" # Vision White (headings)
        secondary: "#f96419" # VB Orange — links / accent
        tertiary: "#3da1d3" # VB Blue — hover
        highlight: rgba(249, 100, 25, 0.12) # orange-tinted internal-link / code bg
        textHighlight: "#f9641955" # VB Orange ==highlight==
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
    options:
      fontOrigin: googleFonts
      # Load an Avenir-Next-like geometric sans (Manrope) for Latin headings/body,
      # and Noto Sans TC (思源黑體) for Chinese. The exact font-family stack —
      # "Avenir Next" first so Apple devices get the real brand font — is set in
      # quartz/styles/custom.scss; this just makes sure the webfonts get loaded.
      title:
        name: Manrope
        weights: [400, 600, 700, 800]
      header:
        name: Manrope
        weights: [400, 600, 700, 800]
      body:
        name: Noto Sans TC
        weights: [400, 500, 700]
      code:
        name: IBM Plex Mono
        weights: [400, 600]
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/visionbase-usc
        Vault: https://github.com/visionbase-usc/vision_base_vault
        Quartz: https://quartz.jzhao.xyz
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
  - source: github:visionbase-usc/quartz-darkmode-vb
    enabled: true
    options: {}
    order: 50
    layout:
      position: left
      priority: 30
      group: toolbar
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
